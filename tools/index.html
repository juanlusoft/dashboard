<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomePiNAS — Audit Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222636;
    --border: #2d3148;
    --accent: #6366f1;
    --accent2: #818cf8;
    --text: #e2e8f0;
    --muted: #64748b;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --user-bubble: #2d3748;
    --claude-bubble: #1e2035;
    --font: 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

  /* ── Layout ─────────────────────────────────── */
  #app {
    display: grid;
    grid-template-columns: 45% 55%;
    grid-template-rows: 48px 1fr;
    height: 100vh;
  }

  /* ── Header ─────────────────────────────────── */
  #header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  #header h1 { font-size: 15px; font-weight: 600; color: var(--text); }
  #header .subtitle { font-size: 12px; color: var(--muted); }
  #header .badge {
    margin-left: auto;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--accent);
    color: white;
    font-weight: 600;
  }
  #reload-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all .15s;
  }
  #reload-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Audit panel ─────────────────────────────── */
  #audit-panel {
    overflow-y: auto;
    padding: 24px 28px;
    border-right: 1px solid var(--border);
    background: var(--bg);
  }
  #audit-panel::-webkit-scrollbar { width: 5px; }
  #audit-panel::-webkit-scrollbar-track { background: transparent; }
  #audit-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Markdown styles */
  #audit-content h1 { font-size: 20px; margin-bottom: 16px; color: var(--text); }
  #audit-content h2 { font-size: 14px; font-weight: 700; color: var(--accent2); margin: 24px 0 10px; text-transform: uppercase; letter-spacing: .06em; }
  #audit-content h3 { font-size: 14px; font-weight: 600; color: var(--text); margin: 16px 0 8px; }
  #audit-content p { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 8px; }
  #audit-content ul, #audit-content ol { padding-left: 18px; margin-bottom: 8px; }
  #audit-content li { font-size: 13px; color: var(--muted); line-height: 1.7; }
  #audit-content strong { color: var(--text); font-weight: 600; }
  #audit-content code { font-family: var(--mono); font-size: 11.5px; background: var(--surface2); padding: 2px 6px; border-radius: 4px; color: var(--accent2); }
  #audit-content pre { background: var(--surface2); padding: 12px 16px; border-radius: 8px; overflow-x: auto; margin: 8px 0 12px; border: 1px solid var(--border); }
  #audit-content pre code { background: none; padding: 0; }
  #audit-content blockquote { border-left: 3px solid var(--accent); padding-left: 14px; margin: 8px 0; }
  #audit-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  #audit-content table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin: 10px 0 16px; }
  #audit-content th { background: var(--surface2); padding: 8px 12px; text-align: left; color: var(--accent2); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
  #audit-content td { padding: 8px 12px; border-bottom: 1px solid var(--border); color: var(--muted); }
  #audit-content td:first-child { color: var(--text); }
  #audit-content tr:last-child td { border-bottom: none; }

  /* Status badges via emoji */
  #audit-content li:has(> * > em) { opacity: .7; }

  /* ── Chat panel ──────────────────────────────── */
  #chat-panel {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  #chat-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #chat-header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
  #chat-header span { font-size: 13px; font-weight: 600; }
  #chat-header .model { margin-left: auto; font-size: 11px; color: var(--muted); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 90%;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px) } to { opacity:1; transform:none } }

  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }

  .msg .label { font-size: 10px; color: var(--muted); padding: 0 4px; }
  .msg.user .label { text-align: right; }

  .bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble { background: var(--accent); color: white; border-radius: 12px 12px 2px 12px; }
  .msg.assistant .bubble {
    background: var(--claude-bubble);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px 12px 12px 2px;
    font-family: var(--font);
  }
  .msg.assistant .bubble code { font-family: var(--mono); font-size: 11.5px; background: var(--surface2); padding: 2px 5px; border-radius: 4px; color: var(--accent2); }
  .msg.assistant .bubble pre { background: var(--surface2); padding: 10px 12px; border-radius: 7px; overflow-x: auto; margin: 8px 0; border: 1px solid var(--border); }
  .msg.assistant .bubble pre code { background: none; padding: 0; }
  .msg.assistant .bubble strong { color: var(--accent2); }

  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 2px 4px; }
  .typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce .9s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: .15s; }
  .typing-indicator span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,80%,100% { transform:translateY(0) } 40% { transform:translateY(-5px) } }

  #input-area {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    background: var(--surface);
  }
  #input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 9px 14px;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 40px;
    transition: border-color .15s;
    line-height: 1.5;
  }
  #input:focus { border-color: var(--accent); }
  #input::placeholder { color: var(--muted); }

  #send-btn {
    background: var(--accent);
    border: none;
    color: white;
    border-radius: 10px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, opacity .15s;
    flex-shrink: 0;
    align-self: flex-end;
  }
  #send-btn:hover { background: #4f46e5; }
  #send-btn:disabled { opacity: .4; cursor: not-allowed; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }
  .empty-state .icon { font-size: 36px; opacity: .5; }
  .empty-state p { font-size: 13px; line-height: 1.7; }
  .empty-state .suggestions { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .suggestion-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    transition: all .15s;
    text-align: left;
  }
  .suggestion-btn:hover { border-color: var(--accent); color: var(--text); }

  #loading-audit {
    color: var(--muted);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 20px;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <span style="font-size:18px">🏠</span>
    <div>
      <h1>HomePiNAS v2</h1>
      <div class="subtitle">Plan de Auditoría</div>
    </div>
    <button id="reload-btn" onclick="loadAudit()">↻ Recargar</button>
    <div class="badge" id="version-badge">v2.13.26</div>
  </header>

  <!-- Audit panel -->
  <section id="audit-panel">
    <div id="loading-audit">⏳ Cargando AUDIT.md...</div>
    <div id="audit-content" style="display:none"></div>
  </section>

  <!-- Chat panel -->
  <section id="chat-panel">
    <div id="chat-header">
      <div class="dot"></div>
      <span>Chat con Claude</span>
      <div class="model">claude-sonnet-4-6</div>
    </div>

    <div id="messages">
      <div class="empty-state" id="empty-state">
        <div class="icon">💬</div>
        <p>Pregúntame sobre el proyecto,<br>bugs pendientes o cualquier sección.</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion('¿Cuántas secciones faltan por auditar?')">¿Cuántas secciones faltan?</button>
          <button class="suggestion-btn" onclick="sendSuggestion('¿Qué bugs críticos quedan sin resolver?')">¿Qué bugs críticos quedan?</button>
          <button class="suggestion-btn" onclick="sendSuggestion('¿Por qué sección deberíamos continuar?')">¿Por dónde seguimos?</button>
          <button class="suggestion-btn" onclick="sendSuggestion('Dame un resumen del estado del proyecto')">Resumen del estado actual</button>
        </div>
      </div>
    </div>

    <div id="input-area">
      <textarea id="input" placeholder="Escribe tu pregunta..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </section>

</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const emptyState = document.getElementById('empty-state');

let history = [];
let isStreaming = false;

// ── Auto-resize textarea ───────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Load AUDIT.md ──────────────────────────────
async function loadAudit() {
  const loading = document.getElementById('loading-audit');
  const content = document.getElementById('audit-content');
  loading.style.display = 'flex';
  content.style.display = 'none';

  try {
    const res = await fetch('/content');
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    content.innerHTML = marked.parse(data.content);
    loading.style.display = 'none';
    content.style.display = 'block';

    // Extract version from content
    const match = data.content.match(/v(\d+\.\d+\.\d+)/);
    if (match) document.getElementById('version-badge').textContent = 'v' + match[1];
  } catch (e) {
    loading.innerHTML = `<span style="color:#ef4444">❌ ${e.message}</span>`;
  }
}

// ── Chat ───────────────────────────────────────
function addMessage(role, text) {
  if (emptyState) emptyState.remove();

  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `
    <div class="label">${role === 'user' ? 'Tú' : 'Claude'}</div>
    <div class="bubble" id="bubble-${Date.now()}">${role === 'assistant' ? '' : escapeHtml(text)}</div>
  `;
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return msg.querySelector('.bubble');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addTypingIndicator() {
  if (emptyState) emptyState.remove();
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  msg.id = 'typing';
  msg.innerHTML = `
    <div class="label">Claude</div>
    <div class="bubble">
      <div class="typing-indicator"><span></span><span></span><span></span></div>
    </div>
  `;
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return msg;
}

function renderMarkdownInBubble(bubble, text) {
  // Simple inline rendering: code blocks, bold, inline code
  bubble.innerHTML = text
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

async function sendMessage(text) {
  const msg = text || inputEl.value.trim();
  if (!msg || isStreaming) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  isStreaming = true;
  sendBtn.disabled = true;

  history.push({ role: 'user', content: msg });
  addMessage('user', msg);

  const typing = addTypingIndicator();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    if (!res.ok) {
      const err = await res.json();
      typing.remove();
      addMessage('assistant', '❌ ' + (err.error || 'Error desconocido'));
      history.pop();
      return;
    }

    typing.remove();
    const bubble = addMessage('assistant', '');
    let fullText = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const parsed = JSON.parse(data);
          if (parsed.error) { bubble.textContent = '❌ ' + parsed.error; return; }
          if (parsed.text) {
            fullText += parsed.text;
            renderMarkdownInBubble(bubble, fullText);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
        } catch {}
      }
    }

    history.push({ role: 'assistant', content: fullText });

  } catch (e) {
    typing.remove();
    addMessage('assistant', '❌ Error de conexión: ' + e.message);
    history.pop();
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function sendSuggestion(text) {
  inputEl.value = text;
  sendMessage(text);
}

// ── Init ───────────────────────────────────────
loadAudit();
inputEl.focus();
</script>
</body>
</html>
